<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Real Life VR Basketball</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <script>
      let score = 0;

      // ====== 1. BACKGROUND TREES GENERATOR ======
      AFRAME.registerComponent('forest-generator', {
        init: function () {
          let scene = this.el;
          for (let i = 0; i < 60; i++) {
            let radius = 8 + Math.random() * 17;
            let angle = Math.random() * Math.PI * 2;
            let x = radius * Math.cos(angle);
            let z = radius * Math.sin(angle);

            let trunk = document.createElement('a-cylinder');
            trunk.setAttribute('position', `${x} 1 ${z}`);
            trunk.setAttribute('radius', '0.3');
            trunk.setAttribute('height', '2');
            trunk.setAttribute('color', '#5C4033'); 
            
            let leaves = document.createElement('a-cone');
            leaves.setAttribute('position', `${x} 3 ${z}`);
            leaves.setAttribute('radius-bottom', '1.5');
            leaves.setAttribute('height', '4');
            leaves.setAttribute('color', '#228B22'); 

            scene.appendChild(trunk);
            scene.appendChild(leaves);
          }
        }
      });

      // ====== 2. VR THUMBSTICK MOVEMENT (FIXED) ======
      AFRAME.registerComponent('vr-movement', {
        init: function () {
          this.player = document.querySelector('#player');
          // Official WebXR event for Oculus/Quest Thumbsticks
          this.el.addEventListener('thumbstickmoved', (evt) => {
            let x = evt.detail.x;
            let y = evt.detail.y;
            
            if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
              let pos = this.player.getAttribute('position');
              this.player.setAttribute('position', {
                x: pos.x + (x * 0.08), // Speed adjustment Left/Right
                y: pos.y,
                z: pos.z + (y * 0.08)  // Speed adjustment Forward/Backward
              });
            }
          });
        }
      });

      // ====== 3. REAL THROWING MECHANICS (FIXED AIM & FORCE) ======
      AFRAME.registerComponent('real-shooter', {
        init: function () {
          this.ball = document.querySelector('#ball');
          this.isHolding = false;
          
          this.el.addEventListener('abuttondown', () => this.spawnBall());
          this.el.addEventListener('xbuttondown', () => this.spawnBall());
          this.el.addEventListener('gripdown', () => this.spawnBall());

          this.el.addEventListener('triggerdown', () => this.shootBall());

          window.addEventListener('keydown', (e) => { if(e.code === 'Space') this.spawnBall(); });
          window.addEventListener('click', () => { if(this.isHolding) this.shootBall(); });
        },

        spawnBall: function () {
          this.isHolding = true;
          this.ball.removeAttribute('dynamic-body');
          this.ball.setAttribute('visible', 'true');
          this.ball.body = null; 
        },

        shootBall: function () {
          if (!this.isHolding) return;
          this.isHolding = false;

          // Ball ka wajan (mass) thoda kam kiya hai taaki lamba throw aasan ho
          this.ball.setAttribute('dynamic-body', 'mass: 0.4; shape: sphere; radius: 0.22');

          let direction = new THREE.Vector3();
          this.el.object3D.getWorldDirection(direction);

          // === AIM & FORCE PERFECTED ===
          let speedFactor = 10.5; // Power boost ki hai
          let forceX = -direction.x * speedFactor;
          let forceY = (-direction.y * speedFactor) + 4.2; // Perfect natural upward arc
          let forceZ = -direction.z * speedFactor;

          setTimeout(() => {
            if (this.ball.body) {
              this.ball.body.velocity.set(forceX, forceY, forceZ);
            }
          }, 20);
        },

        tick: function () {
          if (this.isHolding) {
            let handPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(handPos);
            
            let direction = new THREE.Vector3();
            this.el.object3D.getWorldDirection(direction);
            
            this.ball.setAttribute('position', {
              x: handPos.x - direction.x * 0.3,
              y: handPos.y - direction.y * 0.3,
              z: handPos.z - direction.z * 0.3
            });
            this.ball.setAttribute('velocity', '0 0 0');
          }
        }
      });

      // ====== 4. SCORE DETECTION (BIGGER TRIGGER BOX) ======
      AFRAME.registerComponent('score-trigger', {
        init: function () {
          this.el.addEventListener('collisions', (e) => {
            if (e.detail.els.includes(document.querySelector('#ball'))) {
              score += 1;
              document.querySelector('#score-text').setAttribute('value', 'SCORE: ' + score);
            }
          });
        }
      });
    </script>
  </head>
  
  <body>
    <a-scene physics="gravity: -9.8; debug: false" forest-generator>
      
      <a-sky color="#87CEEB"></a-sky>
      <a-light type="directional" position="-2 4 3" intensity="0.8"></a-light>
      <a-light type="ambient" intensity="0.6"></a-light>

      <a-plane position="0 0 0" rotation="-90 0 0" width="40" height="40" color="#4a5d23" static-body></a-plane>
      <a-plane position="0 0.01 -2" rotation="-90 0 0" width="8" height="10" color="#7f8c8d"></a-plane>

      <a-entity id="player" position="0 0 3" wasd-controls="acceleration: 15">
        
        <a-camera id="camera" look-controls wasd-controls="enabled: false"></a-camera>

        <a-entity id="right-hand" laser-controls="hand: right" oculus-touch-controls="hand: right" real-shooter>
           <a-box width="0.1" height="0.1" depth="0.15" color="#e67e22" opacity="0.8"></a-box>
        </a-entity>

        <a-entity id="left-hand" laser-controls="hand: left" oculus-touch-controls="hand: left" vr-movement>
           <a-box width="0.1" height="0.1" depth="0.15" color="#3498db" opacity="0.8"></a-box>
        </a-entity>
      </a-entity>

      <a-sphere id="ball" radius="0.22" color="#d35400" visible="false">
        <a-torus radius="0.218" radius-tubular="0.005" color="#111"></a-torus>
        <a-torus radius="0.218" radius-tubular="0.005" color="#111" rotation="0 90 0"></a-torus>
      </a-sphere>

      <a-cylinder position="0 2 -4" radius="0.1" height="4" color="#2c3e50" static-body></a-cylinder>
      
      <a-box position="0 3.8 -3.8" width="1.8" height="1.2" depth="0.05" color="#ecf0f1" static-body>
        <a-box position="0 -0.15 0.03" width="0.5" height="0.4" depth="0.01" color="#c0392b"></a-box>
      </a-box>

      <a-torus position="0 3.3 -3.4" rotation="90 0 0" radius="0.32" radius-tubular="0.02" color="#c0392b" static-body></a-torus>
      
      <a-box position="0 2.9 -3.4" width="0.6" height="0.8" depth="0.6" visible="false" static-body="shape: box; isTrigger: true" score-trigger></a-box>
      
      <a-cone position="0 3.0 -3.4" radius-top="0.3" radius-bottom="0.18" height="0.4" color="white" opacity="0.4" open-ended="true"></a-cone>

      <a-entity position="0 4.8 -3.8">
        <a-box width="1.5" height="0.6" depth="0.1" color="#111"></a-box>
        <a-text id="score-text" value="SCORE: 0" position="0 0 0.06" align="center" color="#2ecc71" width="6"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
