<!DOCTYPE html>
<html>
  <head>
    <title>Pro VR Chemistry Lab - 32 Chemicals & Explosions</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.3/dist/super-hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <script>
      // === REACTION LOGIC ENGINE ===
      AFRAME.registerComponent('chemical-reaction', {
        init: function () {
          this.isReacting = false; // Prevent multiple triggers at once

          this.el.addEventListener('collide', (e) => {
            let otherEl = e.detail.body.el;
            if (!otherEl || !otherEl.hasAttribute('chemical-reaction')) return;
            if (this.isReacting || otherEl.components['chemical-reaction'].isReacting) return;

            let myType = this.el.getAttribute('data-chem-type');
            let otherType = otherEl.getAttribute('data-chem-type');

            // Lock objects during reaction
            this.isReacting = true;
            otherEl.components['chemical-reaction'].isReacting = true;

            // --- REACTION FORMULAS ---
            
            // 1. Sodium + Water = EXPLOSION
            if ((myType === 'sodium' && otherType === 'water') || (otherType === 'sodium' && myType === 'water')) {
              this.triggerExplosion();
              otherEl.parentNode.removeChild(otherEl); // Destroy second beaker
            } 
            // 2. Acid + Base = Neutralize (Glow White)
            else if ((myType === 'acid' && otherType === 'base') || (otherType === 'acid' && myType === 'base')) {
              this.changeLiquidColor('#FFFFFF', true);
              otherEl.components['chemical-reaction'].changeLiquidColor('#FFFFFF', true);
            }
            // 3. Magic + Anything = Rainbow Disco
            else if (myType === 'magic' || otherType === 'magic') {
              this.makeRainbow();
              otherEl.components['chemical-reaction'].makeRainbow();
            }
            // 4. Default: Color Mixing (Randomized new color)
            else {
              let randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
              this.changeLiquidColor(randomColor, false);
            }

            // Cooldown before next reaction
            setTimeout(() => { this.isReacting = false; if(otherEl) otherEl.components['chemical-reaction'].isReacting = false; }, 1000);
          });
        },

        changeLiquidColor: function(newColor, glow) {
          let liquid = this.el.querySelector('.liquid');
          if(liquid) {
            liquid.setAttribute('color', newColor);
            if(glow) liquid.setAttribute('material', `emissive: ${newColor}; emissiveIntensity: 0.8`);
          }
        },

        makeRainbow: function() {
          let liquid = this.el.querySelector('.liquid');
          if(liquid) {
            liquid.setAttribute('animation__color', 'property: components.material.material.color; type: color; dir: alternate; dur: 500; loop: true; to: #FF00FF');
            liquid.setAttribute('material', 'emissive: #FF00FF; emissiveIntensity: 0.5');
          }
        },

        triggerExplosion: function() {
          // Blast Sphere
          let blast = document.createElement('a-sphere');
          blast.setAttribute('position', this.el.getAttribute('position'));
          blast.setAttribute('color', '#FF4500');
          blast.setAttribute('material', 'emissive: #FF0000; emissiveIntensity: 1');
          
          // Blast Animation (Expands and fades out)
          blast.setAttribute('animation__scale', 'property: scale; to: 8 8 8; dur: 300; easing: easeOutQuad');
          blast.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 300; easing: easeOutQuad');
          
          this.el.sceneEl.appendChild(blast);

          // Remove Blast and the Beaker after half a second
          setTimeout(() => { if (blast.parentNode) blast.parentNode.removeChild(blast); }, 300);
          if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
        }
      });

      // === SPAWNER ENGINE (Creates 32 Chemicals automatically) ===
      AFRAME.registerComponent('chemical-spawner', {
        init: function () {
          const tableXPositions = [-4.5, -1.5, 1.5, 4.5];
          
          // Library of chemicals with their types and colors
          const chemLibrary = [
            { type: 'sodium', color: '#C0C0C0' }, // Silver
            { type: 'water', color: '#00BFFF' },  // Light Blue
            { type: 'acid', color: '#32CD32' },   // Green
            { type: 'base', color: '#FF1493' },   // Deep Pink
            { type: 'magic', color: '#8A2BE2' },  // Purple
            { type: 'dye_red', color: '#FF0000' },
            { type: 'dye_yellow', color: '#FFD700' },
            { type: 'dye_cyan', color: '#00FFFF' }
          ];

          let count = 0;

          // Loop over 4 tables
          for (let t = 0; t < 4; t++) {
            let tableCenterX = tableXPositions[t];
            
            // Loop 8 places on each table
            let zOffsets = [-3.2, -2.8]; // Two rows
            let xOffsets = [-0.6, -0.2, 0.2, 0.6]; // Four columns

            for(let row of zOffsets) {
              for(let col of xOffsets) {
                let chemData = chemLibrary[count % chemLibrary.length];
                
                let beaker = document.createElement('a-entity');
                beaker.setAttribute('mixin', 'pro-beaker');
                beaker.setAttribute('position', `${tableCenterX + col} 1.3 ${row}`);
                beaker.setAttribute('data-chem-type', chemData.type);
                beaker.setAttribute('chemical-reaction', '');

                let liquid = document.createElement('a-cylinder');
                liquid.setAttribute('class', 'liquid');
                liquid.setAttribute('position', '0 -0.05 0');
                liquid.setAttribute('radius', '0.11');
                liquid.setAttribute('height', '0.2');
                liquid.setAttribute('color', chemData.color);
                liquid.setAttribute('opacity', '0.9');
                
                beaker.appendChild(liquid);
                this.el.sceneEl.appendChild(beaker);
                
                count++;
              }
            }
          }
        }
      });
    </script>
  </head>
  
  <body>
    <a-scene chemical-spawner physics="debug: false; gravity: -9.8" renderer="antialias: true; colorManagement: true;">
      
      <a-assets>
        <a-mixin id="pro-beaker" 
                 geometry="primitive: cylinder; radius: 0.12; height: 0.3" 
                 material="color: #ffffff; opacity: 0.3; transparent: true; metalness: 0.8; roughness: 0.1" 
                 hoverable grabbable stretchable draggable droppable 
                 dynamic-body="shape: cylinder; mass: 1" 
                 shadow="cast: true"></a-mixin>
      </a-assets>

      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#B0BEC5" static-body></a-plane>
      <a-plane position="0 5 0" rotation="90 0 0" width="20" height="20" color="#FFFFFF"></a-plane>
      <a-plane position="0 2.5 -6" width="20" height="5" color="#87CEEB" static-body></a-plane>
      <a-plane position="0 2.5 6" rotation="0 180 0" width="20" height="5" color="#87CEEB" static-body></a-plane>
      <a-plane position="-10 2.5 0" rotation="0 90 0" width="12" height="5" color="#87CEEB" static-body></a-plane>
      <a-plane position="10 2.5 0" rotation="0 -90 0" width="12" height="5" color="#87CEEB" static-body></a-plane>

      <a-box position="-4.5 0.5 -3" width="2" height="1" depth="1.5" color="#111111" static-body></a-box>
      <a-box position="-1.5 0.5 -3" width="2" height="1" depth="1.5" color="#111111" static-body></a-box>
      <a-box position="1.5 0.5 -3" width="2" height="1" depth="1.5" color="#111111" static-body></a-box>
      <a-box position="4.5 0.5 -3" width="2" height="1" depth="1.5" color="#111111" static-body></a-box>

      <a-entity light="type: ambient; color: #FFF; intensity: 0.6"></a-entity>
      <a-entity light="type: point; color: #FFF; intensity: 0.6; distance: 20" position="0 4 -2"></a-entity>

      <a-entity id="rig" movement-controls kinematic-body position="0 0 0">
        
        <a-camera position="0 1.6 0" look-controls>
          <a-entity cursor raycaster="objects: [hoverable]" super-hands position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: white; shader: flat"></a-entity>
        </a-camera>
        
        <a-entity sphere-collider="objects: [hoverable]" 
                  super-hands 
                  hand-controls="hand: left" 
                  static-body="shape: sphere; sphereRadius: 0.05"></a-entity>
                  
        <a-entity sphere-collider="objects: [hoverable]" 
                  super-hands 
                  hand-controls="hand: right" 
                  static-body="shape: sphere; sphereRadius: 0.05"></a-entity>
                  
      </a-entity>
  </body>
</html>
